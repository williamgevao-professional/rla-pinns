program: rla_pinns/train.py
method: grid
metric:
  name: l2_error
  goal: minimize
command:
  - ${env}
  - python
  - ${program}
  - "--wandb"
  - "--wandb_project=deep-hedging-optim"
  - ${args}
parameters:
  optimizer:
    value: LBFGS
  equation:
    value: black-scholes-logS
  boundary_condition:
    value: call_payoff
  dim_Omega:
    value: 1
  model:
    value: mlp-tanh-64
  dtype:
    value: float64
  num_seconds:
    value: 300
  LBFGS_lr:
    values: [0.1, 0.3, 0.5, 1.0]
  LBFGS_history_size:
    values: [50, 100]