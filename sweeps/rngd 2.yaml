program: rla_pinns/train.py
method: grid
metric:
  name: l2_error
  goal: minimize
command:
  - ${env}
  - python
  - ${program}
  - "--wandb"
  - "--wandb_project=deep-hedging-optim"
  - ${args}
parameters:
  optimizer:
    value: RNGD
  equation:
    value: black-scholes-logS
  boundary_condition:
    value: call_payoff
  dim_Omega:
    value: 1
  model:
    value: mlp-tanh-64
  dtype:
    value: float64
  num_seconds:
    value: 300
  RNGD_approximation:
    value: exact
  RNGD_damping:
    values: [0.00000001, 0.0000001, 0.000001, 0.00001, 0.0001]